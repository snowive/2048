<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snowive's 2048</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #121212;
            --grid-bg: #262626;
            --cell-bg: #333333;
            --text-color: #ffffff;
            --tile-size: 90px;
            --tile-gap: 12px;
            --move-speed: 125ms;
        }

        /* Theme Variations */
        body.theme-light {
            --bg-color: #faf8ef;
            --grid-bg: #bbada0;
            --cell-bg: #cdc1b4;
            --text-color: #776e65;
        }

        body.theme-cyber {
            --bg-color: #0d0221;
            --grid-bg: #261447;
            --cell-bg: #5a189a;
            --text-color: #ff0054;
        }

        @media (max-width: 500px) {
            :root { --tile-size: 70px; --tile-gap: 8px; }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, sans-serif;
            transition: background-color 0.3s;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        .centered-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            gap: 20px;
        }

        .game-board {
            position: relative;
            background-color: var(--grid-bg);
            border-radius: 12px;
            padding: var(--tile-gap);
            user-select: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .grid-layer {
            display: grid;
            gap: var(--tile-gap);
        }

        .grid-cell {
            width: var(--tile-size);
            height: var(--tile-size);
            background-color: var(--cell-bg);
            border-radius: 8px;
        }

        .tile-layer {
            position: absolute;
            top: var(--tile-gap);
            left: var(--tile-gap);
            pointer-events: none;
        }

        .tile {
            position: absolute;
            width: var(--tile-size);
            height: var(--tile-size);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: calc(var(--tile-size) * 0.4);
            transition: transform var(--move-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Animations */
        .animate-spawn { animation: spawn 200ms ease-out forwards; }
        .animate-pop { animation: pop 200ms ease-in-out; }

        @keyframes spawn {
            0% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1); opacity: 1; }
        }
        @keyframes pop {
            0% { transform: translate(var(--tx), var(--ty)) scale(1); }
            50% { transform: translate(var(--tx), var(--ty)) scale(1.15); }
            100% { transform: translate(var(--tx), var(--ty)) scale(1); }
        }

        /* Colors based on standard 2048 */
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: white; }
        .tile-16 { background: #f59563; color: white; }
        .tile-32 { background: #f67c5f; color: white; }
        .tile-64 { background: #f65e3b; color: white; }
        .tile-128 { background: #edcf72; color: white; box-shadow: 0 0 10px #edcf72; }
        .tile-2048 { background: #edc22e; color: white; box-shadow: 0 0 20px #edc22e; }

        .btn {
            background: #8f7a66;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn:active { transform: scale(0.95); }

        /* Settings Sidebar */
        #settings-panel {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }
        #settings-panel.open { transform: translateX(0); }
    </style>
</head>
<body>

    <div class="centered-layout">
        <!-- Header -->
        <header class="flex justify-between items-end w-full max-w-[500px] px-4">
            <div class="flex flex-col gap-2">
                <h1 class="text-6xl font-black tracking-tighter leading-none">2048</h1>
                <div class="flex gap-2">
                    <button onclick="game.init()" class="btn text-sm uppercase">New Game</button>
                    <button onclick="toggleSettings()" class="bg-gray-700 p-2 rounded-lg text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <div class="flex gap-2">
                <div class="bg-[#2d2d2d] px-4 py-2 rounded-lg text-center min-w-[80px]">
                    <div class="text-[10px] uppercase font-bold opacity-50">Score</div>
                    <div id="score" class="text-xl font-black">0</div>
                </div>
                <div class="bg-[#2d2d2d] px-4 py-2 rounded-lg text-center min-w-[80px]">
                    <div class="text-[10px] uppercase font-bold opacity-50">Best</div>
                    <div id="best" class="text-xl font-black">0</div>
                </div>
            </div>
        </header>

        <!-- Board -->
        <div id="game-container" class="game-board">
            <div id="grid-layer" class="grid-layer"></div>
            <div id="tile-container" class="tile-layer"></div>
        </div>
    </div>

    <!-- Settings Sidebar -->
    <div id="settings-panel" class="fixed top-0 right-0 h-full w-80 bg-[#1e1e1e] shadow-2xl z-[100] p-6 border-l border-white/10">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold">Settings</h2>
            <button onclick="toggleSettings()" class="text-gray-400 hover:text-white">✕</button>
        </div>

        <div class="space-y-6">
            <section>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-2 tracking-widest">Grid Size</label>
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="game.updateSize(3)" class="bg-gray-800 p-2 rounded hover:bg-blue-600 transition">3x3</button>
                    <button onclick="game.updateSize(4)" class="bg-gray-800 p-2 rounded hover:bg-blue-600 transition">4x4</button>
                    <button onclick="game.updateSize(5)" class="bg-gray-800 p-2 rounded hover:bg-blue-600 transition">5x5</button>
                    <button onclick="game.updateSize(6)" class="bg-gray-800 p-2 rounded hover:bg-blue-600 transition">6x6</button>
                </div>
            </section>

            <section>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-2 tracking-widest">Theme</label>
                <select onchange="changeTheme(this.value)" class="w-full bg-gray-800 p-3 rounded-lg border border-white/10">
                    <option value="dark">Dark Mode (Default)</option>
                    <option value="light">Light Mode (Classic)</option>
                    <option value="cyber">Cyberpunk</option>
                </select>
            </section>

            <section>
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" onchange="toggleAnim(this.checked)" checked class="w-5 h-5 accent-blue-500">
                    <span class="text-sm font-medium">Animations Enabled</span>
                </label>
            </section>
        </div>

        <div class="absolute bottom-6 left-6 right-6 text-center text-xs text-gray-600">
            Progress is saved automatically
        </div>
    </div>

    <!-- Game Over -->
    <div id="game-over" class="hidden fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-[#2d2d2d] p-10 rounded-2xl text-center max-w-xs w-full shadow-2xl">
            <h2 class="text-4xl font-black mb-6">Game Over</h2>
            <button onclick="game.init()" class="btn w-full py-4 uppercase tracking-widest">Restart</button>
        </div>
    </div>

    <script>
        function toggleSettings() {
            document.getElementById('settings-panel').classList.toggle('open');
        }

        function changeTheme(theme) {
            document.body.className = `theme-${theme}`;
            localStorage.setItem('2048-theme', theme);
        }

        function toggleAnim(enabled) {
            document.documentElement.style.setProperty('--move-speed', enabled ? '125ms' : '0ms');
        }

        class Game2048 {
            constructor() {
                this.gridLayer = document.getElementById('grid-layer');
                this.tileContainer = document.getElementById('tile-container');
                this.scoreEl = document.getElementById('score');
                this.bestEl = document.getElementById('best');
                
                this.size = parseInt(localStorage.getItem('2048-size')) || 4;
                this.tiles = []; 
                this.score = 0;
                this.best = parseInt(localStorage.getItem('2048-best-v5')) || 0;
                this.nextId = 0;

                this.init();
                this.setupInput();
                this.bestEl.innerText = this.best;

                const savedTheme = localStorage.getItem('2048-theme');
                if(savedTheme) changeTheme(savedTheme);
            }

            updateSize(n) {
                this.size = n;
                localStorage.setItem('2048-size', n);
                this.init();
            }

            init() {
                this.tiles = [];
                this.score = 0;
                this.nextId = 0;
                this.updateScore(0);
                this.gridLayer.innerHTML = '';
                this.tileContainer.innerHTML = '';
                document.getElementById('game-over').classList.add('hidden');

                // Generate Grid Layout
                this.gridLayer.style.gridTemplateColumns = `repeat(${this.size}, 1fr)`;
                for (let i = 0; i < this.size * this.size; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    this.gridLayer.appendChild(cell);
                }

                this.addRandomTile();
                this.addRandomTile();
                this.render();
            }

            addRandomTile() {
                const occupied = new Set(this.tiles.map(t => `${t.r},${t.c}`));
                const empty = [];
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (!occupied.has(`${r},${c}`)) empty.push({r, c});
                    }
                }
                if (empty.length) {
                    const {r, c} = empty[Math.floor(Math.random() * empty.length)];
                    this.tiles.push({ r, c, val: Math.random() < 0.9 ? 2 : 4, id: this.nextId++, isNew: true });
                }
            }

            updateScore(amount) {
                this.score += amount;
                this.scoreEl.innerText = this.score;
                if (this.score > this.best) {
                    this.best = this.score;
                    this.bestEl.innerText = this.best;
                    localStorage.setItem('2048-best-v5', this.best);
                }
            }

            render() {
                const currentIds = new Set(this.tiles.map(t => `tile-${t.id}`));
                const style = getComputedStyle(document.documentElement);
                const tileSize = parseFloat(style.getPropertyValue('--tile-size'));
                const tileGap = parseFloat(style.getPropertyValue('--tile-gap'));
                const step = tileSize + tileGap;

                Array.from(this.tileContainer.children).forEach(child => {
                    if (!currentIds.has(child.id)) setTimeout(() => child.remove(), 100);
                });

                this.tiles.forEach(t => {
                    let el = document.getElementById(`tile-${t.id}`);
                    if (!el) {
                        el = document.createElement('div');
                        el.id = `tile-${t.id}`;
                        this.tileContainer.appendChild(el);
                    }

                    const tx = t.c * step;
                    const ty = t.r * step;
                    el.style.setProperty('--tx', `${tx}px`);
                    el.style.setProperty('--ty', `${ty}px`);
                    
                    el.className = `tile tile-${t.val} ${t.isNew ? 'animate-spawn' : ''} ${t.merged ? 'animate-pop' : ''}`;
                    el.innerText = t.val;
                    el.style.transform = `translate(${tx}px, ${ty}px)`;

                    t.isNew = false;
                    t.merged = false;
                });
            }

            move(dir) {
                const vec = [{r:-1,c:0}, {r:0,c:1}, {r:1,c:0}, {r:0,c:-1}][dir];
                let moved = false;
                let scoreInc = 0;

                const sorted = [...this.tiles].sort((a, b) => {
                    if (dir === 0) return a.r - b.r;
                    if (dir === 2) return b.r - a.r;
                    if (dir === 3) return a.c - b.c;
                    return b.c - a.c;
                });

                const mergedIds = new Set();
                const nextTiles = [];

                sorted.forEach(t => {
                    let r = t.r, c = t.c;
                    let nr = r + vec.r, nc = c + vec.c;

                    while (nr >= 0 && nr < this.size && nc >= 0 && nc < this.size && !nextTiles.find(ot => ot.r === nr && ot.c === nc)) {
                        r = nr; c = nc;
                        nr += vec.r; nc += vec.c;
                    }

                    const blocker = nextTiles.find(ot => ot.r === nr && ot.c === nc);
                    if (blocker && blocker.val === t.val && !mergedIds.has(blocker.id)) {
                        moved = true;
                        t.r = nr; t.c = nc;
                        blocker.val *= 2;
                        blocker.merged = true;
                        mergedIds.add(blocker.id);
                        scoreInc += blocker.val;
                    } else {
                        if (r !== t.r || c !== t.c) moved = true;
                        t.r = r; t.c = c;
                        nextTiles.push(t);
                    }
                });

                if (moved) {
                    this.tiles = nextTiles;
                    this.updateScore(scoreInc);
                    this.addRandomTile();
                    this.render();
                    if (this.isGameOver()) document.getElementById('game-over').classList.remove('hidden');
                }
            }

            isGameOver() {
                if (this.tiles.length < this.size * this.size) return false;
                for (const t of this.tiles) {
                    for (const v of [{r:1,c:0},{r:-1,c:0},{r:0,c:1},{r:0,c:-1}]) {
                        const nt = this.tiles.find(o => o.r === t.r + v.r && o.c === t.c + v.c);
                        if (nt && nt.val === t.val) return false;
                    }
                }
                return true;
            }

            setupInput() {
                window.addEventListener('keydown', e => {
                    const k = e.key.toLowerCase();
                    if (k === 'arrowup' || k === 'w') this.move(0);
                    if (k === 'arrowright' || k === 'd') this.move(1);
                    if (k === 'arrowdown' || k === 's') this.move(2);
                    if (k === 'arrowleft' || k === 'a') this.move(3);
                });

                let sx, sy;
                window.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; });
                window.addEventListener('touchend', e => {
                    const dx = e.changedTouches[0].clientX - sx;
                    const dy = e.changedTouches[0].clientY - sy;
                    if (Math.max(Math.abs(dx), Math.abs(dy)) > 30) {
                        if (Math.abs(dx) > Math.abs(dy)) this.move(dx > 0 ? 1 : 3);
                        else this.move(dy > 0 ? 2 : 0);
                    }
                });
            }
        }

        const game = new Game2048();
    </script>
</body>
</html>
