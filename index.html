<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #121212;
            --grid-bg: #262626;
            --cell-bg: #333333;
            --text-light: #ffffff;
            /* Scaled up sizes */
            --tile-size: 100px;
            --tile-gap: 12px;
            --board-size: calc((var(--tile-size) * 4) + (var(--tile-gap) * 5));
        }

        @media (max-width: 500px) {
            :root {
                --tile-size: 75px;
                --tile-gap: 8px;
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'Inter', system-ui, sans-serif;
            touch-action: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .main-wrapper {
            width: var(--board-size);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .header-right {
            display: flex;
            gap: 10px;
        }

        .game-container {
            width: var(--board-size);
            height: var(--board-size);
            position: relative;
            background-color: var(--grid-bg);
            border-radius: 12px;
            padding: var(--tile-gap);
            user-select: none;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: var(--tile-gap);
            width: 100%;
            height: 100%;
        }

        .grid-cell {
            background-color: var(--cell-bg);
            border-radius: 8px;
        }

        .tile-container {
            position: absolute;
            top: var(--tile-gap);
            left: var(--tile-gap);
            pointer-events: none;
        }

        .tile {
            position: absolute;
            width: var(--tile-size);
            height: var(--tile-size);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: calc(var(--tile-size) * 0.4);
            transition: transform 125ms cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        /* Animations */
        .tile-new {
            animation: spawn 200ms cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .tile-merged {
            z-index: 20;
            animation: pop 200ms ease-in-out;
        }

        @keyframes spawn {
            0% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
            100% { opacity: 1; transform: translate(var(--tx), var(--ty)) scale(1); }
        }

        @keyframes pop {
            0% { transform: translate(var(--tx), var(--ty)) scale(1); }
            50% { transform: translate(var(--tx), var(--ty)) scale(1.15); }
            100% { transform: translate(var(--tx), var(--ty)) scale(1); }
        }

        /* Styling */
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: white; }
        .tile-16 { background: #f59563; color: white; }
        .tile-32 { background: #f67c5f; color: white; }
        .tile-64 { background: #f65e3b; color: white; }
        .tile-128 { background: #edcf72; color: white; font-size: calc(var(--tile-size) * 0.35); }
        .tile-256 { background: #edcc61; color: white; font-size: calc(var(--tile-size) * 0.35); }
        .tile-512 { background: #edc850; color: white; font-size: calc(var(--tile-size) * 0.35); }
        .tile-1024 { background: #edc53f; color: white; font-size: calc(var(--tile-size) * 0.3); }
        .tile-2048 { background: #edc22e; color: white; font-size: calc(var(--tile-size) * 0.3); box-shadow: 0 0 20px #edc22e; }

        .score-box {
            background: var(--grid-bg);
            padding: 8px 16px;
            border-radius: 8px;
            text-align: center;
            min-width: 80px;
        }

        .btn-new-game {
            background: #8f7a66;
            color: white;
            font-weight: 800;
            padding: 12px 20px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-new-game:active {
            transform: scale(0.95);
            opacity: 0.9;
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.9);
            display: none;
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header>
            <div class="header-left">
                <h1 class="text-5xl font-black tracking-tighter leading-none">2048</h1>
                <button onclick="game.init()" class="btn-new-game">New Game</button>
            </div>
            <div class="header-right">
                <div class="score-box">
                    <div class="text-[10px] uppercase font-bold text-gray-500">Score</div>
                    <div id="score" class="text-xl font-black">0</div>
                </div>
                <div class="score-box">
                    <div class="text-[10px] uppercase font-bold text-gray-500">Best</div>
                    <div id="best" class="text-xl font-black">0</div>
                </div>
            </div>
        </header>

        <div class="game-container">
            <div class="grid-container">
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
            <div id="tile-container" class="tile-container"></div>
        </div>
    </div>

    <div id="game-over" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="bg-[#2d2d2d] p-10 rounded-3xl text-center max-w-xs w-full border border-white/10 shadow-2xl">
            <h2 class="text-4xl font-black mb-4">Game Over</h2>
            <div class="bg-black/20 p-4 rounded-xl mb-8">
                <p id="final-score-msg" class="text-gray-400 font-bold"></p>
            </div>
            <button onclick="game.init()" class="btn-new-game w-full py-4 rounded-xl">Try Again</button>
        </div>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.container = document.getElementById('tile-container');
                this.scoreEl = document.getElementById('score');
                this.bestEl = document.getElementById('best');
                this.gameOverEl = document.getElementById('game-over');
                this.finalScoreEl = document.getElementById('final-score-msg');
                
                this.size = 4;
                this.tiles = []; 
                this.score = 0;
                this.best = parseInt(localStorage.getItem('2048-best-v4')) || 0;
                this.bestEl.innerText = this.best;
                this.nextId = 0;

                // Adjust for dynamic sizes
                this.updateDimensions();
                window.addEventListener('resize', () => this.updateDimensions());
                
                this.setupInput();
                this.init();
            }

            updateDimensions() {
                const style = getComputedStyle(document.documentElement);
                this.tileSize = parseFloat(style.getPropertyValue('--tile-size'));
                this.tileGap = parseFloat(style.getPropertyValue('--tile-gap'));
                this.step = this.tileSize + this.tileGap;
                this.render();
            }

            init() {
                this.tiles = [];
                this.score = 0;
                this.nextId = 0;
                this.updateScore(0);
                this.container.innerHTML = '';
                this.gameOverEl.style.display = 'none';
                
                this.addRandomTile();
                this.addRandomTile();
                this.render();
            }

            addRandomTile() {
                const occupied = new Set(this.tiles.map(t => `${t.r},${t.c}`));
                const emptyCells = [];
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (!occupied.has(`${r},${c}`)) emptyCells.push({r, c});
                    }
                }
                
                if (emptyCells.length) {
                    const {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    this.tiles.push({
                        r, c, 
                        val: Math.random() < 0.9 ? 2 : 4,
                        id: this.nextId++,
                        isNew: true
                    });
                }
            }

            updateScore(amount) {
                this.score += amount;
                this.scoreEl.innerText = this.score;
                if (this.score > this.best) {
                    this.best = this.score;
                    this.bestEl.innerText = this.best;
                    localStorage.setItem('2048-best-v4', this.best);
                }
            }

            render() {
                const currentIds = new Set(this.tiles.map(t => `tile-${t.id}`));
                
                Array.from(this.container.children).forEach(child => {
                    if (!currentIds.has(child.id)) {
                        setTimeout(() => child.remove(), 100);
                    }
                });

                this.tiles.forEach(tileData => {
                    let tileEl = document.getElementById(`tile-${tileData.id}`);
                    
                    if (!tileEl) {
                        tileEl = document.createElement('div');
                        tileEl.id = `tile-${tileData.id}`;
                        this.container.appendChild(tileEl);
                    }

                    const tx = tileData.c * this.step; 
                    const ty = tileData.r * this.step;

                    tileEl.style.setProperty('--tx', `${tx}px`);
                    tileEl.style.setProperty('--ty', `${ty}px`);

                    tileEl.className = `tile tile-${tileData.val} ${tileData.isNew ? 'tile-new' : ''} ${tileData.merged ? 'tile-merged' : ''}`;
                    tileEl.innerText = tileData.val;
                    tileEl.style.transform = `translate(${tx}px, ${ty}px)`;

                    tileData.isNew = false;
                    tileData.merged = false;
                });
            }

            move(direction) {
                const vectors = [{r:-1, c:0}, {r:0, c:1}, {r:1, c:0}, {r:0, c:-1}];
                const vector = vectors[direction];
                let moved = false;
                let scoreInc = 0;

                const sortedTiles = [...this.tiles].sort((a, b) => {
                    if (direction === 0) return a.r - b.r;
                    if (direction === 2) return b.r - a.r;
                    if (direction === 3) return a.c - b.c;
                    if (direction === 1) return b.c - a.c;
                });

                const mergedIds = new Set();
                const newTiles = [];

                sortedTiles.forEach(tile => {
                    let currR = tile.r;
                    let currC = tile.c;
                    let nextR = currR + vector.r;
                    let nextC = currC + vector.c;

                    while (this.isWithinBounds(nextR, nextC) && !this.getTileAt(nextR, nextC, newTiles)) {
                        currR = nextR;
                        currC = nextC;
                        nextR += vector.r;
                        nextC += vector.c;
                    }

                    const blockingTile = this.getTileAt(nextR, nextC, newTiles);
                    
                    if (blockingTile && blockingTile.val === tile.val && !mergedIds.has(blockingTile.id)) {
                        moved = true;
                        tile.r = nextR;
                        tile.c = nextC;
                        blockingTile.val *= 2;
                        blockingTile.merged = true;
                        mergedIds.add(blockingTile.id);
                        scoreInc += blockingTile.val;
                    } else {
                        if (currR !== tile.r || currC !== tile.c) moved = true;
                        tile.r = currR;
                        tile.c = currC;
                        newTiles.push(tile);
                    }
                });

                if (moved) {
                    this.tiles = newTiles;
                    this.updateScore(scoreInc);
                    this.addRandomTile();
                    this.render();
                    
                    if (this.isGameOver()) {
                        this.finalScoreEl.innerText = `SCORE: ${this.score}`;
                        this.gameOverEl.style.display = 'flex';
                    }
                }
            }

            isWithinBounds(r, c) {
                return r >= 0 && r < this.size && c >= 0 && c < this.size;
            }

            getTileAt(r, c, list) {
                return list.find(t => t.r === r && t.c === c);
            }

            isGameOver() {
                if (this.tiles.length < 16) return false;
                for (const tile of this.tiles) {
                    for (const v of [{r:1,c:0},{r:-1,c:0},{r:0,c:1},{r:0,c:-1}]) {
                        const other = this.getTileAt(tile.r + v.r, tile.c + v.c, this.tiles);
                        if (other && other.val === tile.val) return false;
                    }
                }
                return true;
            }

            setupInput() {
                window.addEventListener('keydown', (e) => {
                    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "w", "a", "s", "d"].includes(e.key.toLowerCase())) {
                        e.preventDefault();
                        const key = e.key.toLowerCase();
                        if (key === 'arrowup' || key === 'w') this.move(0);
                        if (key === 'arrowright' || key === 'd') this.move(1);
                        if (key === 'arrowdown' || key === 's') this.move(2);
                        if (key === 'arrowleft' || key === 'a') this.move(3);
                    }
                });

                let startX, startY;
                window.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                }, {passive: false});

                window.addEventListener('touchend', (e) => {
                    if (!startX || !startY) return;
                    const dx = e.changedTouches[0].clientX - startX;
                    const dy = e.changedTouches[0].clientY - startY;
                    if (Math.max(Math.abs(dx), Math.abs(dy)) > 40) {
                        if (Math.abs(dx) > Math.abs(dy)) this.move(dx > 0 ? 1 : 3);
                        else this.move(dy > 0 ? 2 : 0);
                    }
                }, {passive: false});
            }
        }

        const game = new Game2048();
    </script>
</body>
</html>
