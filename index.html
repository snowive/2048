<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/x-icon" href="IMG_4552.png">
    <title>2048</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #121212;
            --grid-bg: #262626;
            --cell-bg: #333333;
            --text-color: #ffffff;
            --tile-size: 85px; /* Will be overridden by JS */
            --tile-gap: 12px;
            --move-speed: 110ms;
        }

        body.theme-light {
            --bg-color: #faf8ef;
            --grid-bg: #bbada0;
            --cell-bg: rgba(238, 228, 218, 0.35);
            --text-color: #776e65;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            transition: background-color 0.3s ease;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Container for blur effect */
        .main-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            gap: 24px;
            transition: filter 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: filter, transform;
            padding: 20px;
        }

        /* Blur state */
        body.settings-open .main-stage {
            filter: blur(12px) brightness(0.6);
            transform: scale(0.95);
            pointer-events: none;
        }

        /* Title Area */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 440px; /* Aligns with max board size */
        }

        .game-board {
            position: relative;
            background-color: var(--grid-bg);
            border-radius: 8px;
            padding: var(--tile-gap);
            user-select: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .grid-layer {
            display: grid;
            gap: var(--tile-gap);
        }

        .grid-cell {
            width: var(--tile-size);
            height: var(--tile-size);
            background-color: var(--cell-bg);
            border-radius: 6px;
        }

        .tile-layer {
            position: absolute;
            top: var(--tile-gap);
            left: var(--tile-gap);
            pointer-events: none;
        }

        .tile {
            position: absolute;
            width: var(--tile-size);
            height: var(--tile-size);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: calc(var(--tile-size) * 0.42);
            transition: transform var(--move-speed) cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .tile-128, .tile-256, .tile-512 { font-size: calc(var(--tile-size) * 0.35); }
        .tile-1024, .tile-2048 { font-size: calc(var(--tile-size) * 0.3); }

        .animate-spawn { animation: spawn 150ms ease-out forwards; }
        .animate-pop { z-index: 20; animation: pop 180ms ease-in-out; }

        @keyframes spawn {
            0% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1); opacity: 1; }
        }
        @keyframes pop {
            0% { transform: translate(var(--tx), var(--ty)) scale(1); }
            50% { transform: translate(var(--tx), var(--ty)) scale(1.18); }
            100% { transform: translate(var(--tx), var(--ty)) scale(1); }
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: white; }
        .tile-16 { background: #f59563; color: white; }
        .tile-32 { background: #f67c5f; color: white; }
        .tile-64 { background: #f65e3b; color: white; }
        .tile-128 { background: #edcf72; color: white; box-shadow: 0 0 8px #edcf72; }
        .tile-256 { background: #edcc61; color: white; box-shadow: 0 0 12px #edcc61; }
        .tile-512 { background: #edc850; color: white; box-shadow: 0 0 15px #edc850; }
        .tile-1024 { background: #edc53f; color: white; }
        .tile-2048 { background: #edc22e; color: white; box-shadow: 0 0 25px #edc22e; }

        .score-row {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 440px;
        }

        .score-box {
            flex: 1;
            background: var(--grid-bg);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        /* Settings Sidebar */
        #settings-panel {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateX(100%);
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }
        #settings-panel.open { transform: translateX(0); }
        
        body.theme-light #settings-panel {
            background: rgba(250, 248, 239, 0.8);
            color: #776e65;
            border-left: 1px solid rgba(0, 0, 0, 0.1);
        }

        #menu-overlay {
            position: fixed;
            inset: 0;
            z-index: 90;
            display: none;
        }
        body.settings-open #menu-overlay {
            display: block;
        }
    </style>
</head>
<body>

    <div id="menu-overlay" onclick="toggleSettings()"></div>

    <div class="main-stage">
        <div class="header-top">
            <h1 class="text-4xl md:text-5xl font-black tracking-tighter">2048</h1>
            <div class="flex gap-2">
                <button onclick="game.init()" class="bg-[#8f7a66] hover:bg-[#7f6a56] text-white font-bold py-2 px-4 rounded-md uppercase text-xs md:text-sm transition-colors">New Game</button>
                <button onclick="toggleSettings()" class="bg-[#bbada0] p-2 rounded-md text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>

        <div id="game-container" class="game-board">
            <div id="grid-layer" class="grid-layer"></div>
            <div id="tile-container" class="tile-layer"></div>
        </div>

        <div class="score-row">
            <div class="score-box">
                <div class="text-[10px] uppercase font-black opacity-60 tracking-widest">Score</div>
                <div id="score" class="text-xl md:text-2xl font-black">0</div>
            </div>
            <div class="score-box">
                <div class="text-[10px] uppercase font-black opacity-60 tracking-widest">Best</div>
                <div id="best" class="text-xl md:text-2xl font-black">0</div>
            </div>
        </div>
    </div>

    <div id="settings-panel" class="fixed top-0 right-0 h-full w-72 z-[100] p-8 shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black italic uppercase">Options</h2>
            <button onclick="toggleSettings()" class="opacity-50 hover:opacity-100 text-2xl">✕</button>
        </div>

        <div class="space-y-8">
            <div>
                <label class="block text-[11px] font-black uppercase opacity-50 mb-3 tracking-[0.2em]">Board Size</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="game.updateSize(3)" class="bg-[#bbada0]/20 p-3 rounded-lg hover:bg-[#8f7a66] hover:text-white transition font-bold">3x3</button>
                    <button onclick="game.updateSize(4)" class="bg-[#bbada0]/20 p-3 rounded-lg hover:bg-[#8f7a66] hover:text-white transition font-bold">4x4</button>
                    <button onclick="game.updateSize(5)" class="bg-[#bbada0]/20 p-3 rounded-lg hover:bg-[#8f7a66] hover:text-white transition font-bold">5x5</button>
                    <button onclick="game.updateSize(6)" class="bg-[#bbada0]/20 p-3 rounded-lg hover:bg-[#8f7a66] hover:text-white transition font-bold">6x6</button>
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-black uppercase opacity-50 mb-3 tracking-[0.2em]">Appearance</label>
                <div class="flex flex-col gap-2">
                    <button onclick="changeTheme('dark')" class="text-left p-3 rounded-lg bg-[#2d2d2d] text-white font-bold border border-white/5">Dark Mode</button>
                    <button onclick="changeTheme('light')" class="text-left p-3 rounded-lg bg-[#eee4da] text-[#776e65] font-bold border border-black/10">Light Mode</button>
                </div>
            </div>
        </div>
    </div>

    <div id="game-over" class="hidden fixed inset-0 z-[200] bg-black/70 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-[#2d2d2d] p-12 rounded-3xl text-center max-w-sm w-full shadow-2xl border border-white/5">
            <h2 class="text-5xl font-black mb-2 text-white">Oops!</h2>
            <p class="text-gray-400 mb-8 font-bold">No more moves left.</p>
            <button onclick="game.init()" class="w-full bg-[#8f7a66] text-white py-4 rounded-xl font-black uppercase tracking-widest text-lg shadow-xl active:scale-95 transition">Try Again</button>
        </div>
    </div>

    <script>
        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            const body = document.body;
            panel.classList.toggle('open');
            body.classList.toggle('settings-open');
        }

        function changeTheme(theme) {
            document.body.classList.remove('theme-light', 'theme-dark');
            document.body.classList.add(`theme-${theme}`);
            localStorage.setItem('2048-theme', theme);
        }

        class Game2048 {
            constructor() {
                this.gridLayer = document.getElementById('grid-layer');
                this.tileContainer = document.getElementById('tile-container');
                this.scoreEl = document.getElementById('score');
                this.bestEl = document.getElementById('best');
                
                this.size = parseInt(localStorage.getItem('2048-size')) || 4;
                this.tiles = []; 
                this.score = 0;
                this.best = parseInt(localStorage.getItem('2048-best-v6')) || 0;
                this.nextId = 0;

                const savedTheme = localStorage.getItem('2048-theme') || 'dark';
                changeTheme(savedTheme);

                window.addEventListener('resize', () => this.resize());
                this.setupInput();
                this.init();
            }

            resize() {
                // Calculate ideal tile size based on viewport
                const padding = 40; // Total horizontal padding for mobile
                const maxBoardWidth = Math.min(window.innerWidth - padding, 440);
                const maxBoardHeight = window.innerHeight - 250; // Leave space for header/score
                const boardLimit = Math.min(maxBoardWidth, maxBoardHeight);
                
                const gap = 12;
                const totalGap = (this.size + 1) * gap;
                const tileSize = (boardLimit - totalGap) / this.size;

                document.documentElement.style.setProperty('--tile-size', `${tileSize}px`);
                document.documentElement.style.setProperty('--tile-gap', `${gap}px`);
                
                this.render();
            }

            updateSize(n) {
                this.size = n;
                localStorage.setItem('2048-size', n);
                this.init();
            }

            init() {
                this.tiles = [];
                this.score = 0;
                this.nextId = 0;
                this.updateScore(0);
                this.gridLayer.innerHTML = '';
                this.tileContainer.innerHTML = '';
                document.getElementById('game-over').classList.add('hidden');

                this.gridLayer.style.gridTemplateColumns = `repeat(${this.size}, 1fr)`;
                for (let i = 0; i < this.size * this.size; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    this.gridLayer.appendChild(cell);
                }

                this.resize();
                this.addRandomTile();
                this.addRandomTile();
                this.render();
            }

            addRandomTile() {
                const occupied = new Set(this.tiles.map(t => `${t.r},${t.c}`));
                const empty = [];
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (!occupied.has(`${r},${c}`)) empty.push({r, c});
                    }
                }
                if (empty.length) {
                    const {r, c} = empty[Math.floor(Math.random() * empty.length)];
                    this.tiles.push({ r, c, val: Math.random() < 0.9 ? 2 : 4, id: this.nextId++, isNew: true });
                }
            }

            updateScore(amount) {
                this.score += amount;
                this.scoreEl.innerText = this.score;
                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('2048-best-v6', this.best);
                }
                this.bestEl.innerText = this.best;
            }

            render() {
                const currentIds = new Set(this.tiles.map(t => `tile-${t.id}`));
                const style = getComputedStyle(document.documentElement);
                const tileSize = parseFloat(style.getPropertyValue('--tile-size'));
                const tileGap = parseFloat(style.getPropertyValue('--tile-gap'));
                const step = tileSize + tileGap;

                // Sync DOM
                Array.from(this.tileContainer.children).forEach(child => {
                    if (!currentIds.has(child.id)) {
                        child.style.opacity = '0';
                        setTimeout(() => child.remove(), 120);
                    }
                });

                this.tiles.forEach(t => {
                    let el = document.getElementById(`tile-${t.id}`);
                    if (!el) {
                        el = document.createElement('div');
                        el.id = `tile-${t.id}`;
                        this.tileContainer.appendChild(el);
                    }

                    const tx = t.c * step;
                    const ty = t.r * step;
                    el.style.setProperty('--tx', `${tx}px`);
                    el.style.setProperty('--ty', `${ty}px`);
                    
                    el.className = `tile tile-${t.val} ${t.isNew ? 'animate-spawn' : ''} ${t.merged ? 'animate-pop' : ''}`;
                    el.innerText = t.val;
                    el.style.transform = `translate(${tx}px, ${ty}px)`;

                    t.isNew = false;
                    t.merged = false;
                });
            }

            move(dir) {
                if (document.body.classList.contains('settings-open')) return;
                
                const vec = [{r:-1,c:0}, {r:0,c:1}, {r:1,c:0}, {r:0,c:-1}][dir];
                let moved = false;
                let scoreInc = 0;

                const sorted = [...this.tiles].sort((a, b) => {
                    if (dir === 0) return a.r - b.r;
                    if (dir === 2) return b.r - a.r;
                    if (dir === 3) return a.c - b.c;
                    return b.c - a.c;
                });

                const mergedIds = new Set();
                const nextTiles = [];

                sorted.forEach(t => {
                    let r = t.r, c = t.c;
                    let nr = r + vec.r, nc = c + vec.c;

                    while (nr >= 0 && nr < this.size && nc >= 0 && nc < this.size && !nextTiles.find(ot => ot.r === nr && ot.c === nc)) {
                        r = nr; c = nc;
                        nr += vec.r; nc += vec.c;
                    }

                    const blocker = nextTiles.find(ot => ot.r === nr && ot.c === nc);
                    if (blocker && blocker.val === t.val && !mergedIds.has(blocker.id)) {
                        moved = true;
                        t.r = nr; t.c = nc;
                        blocker.val *= 2;
                        blocker.merged = true;
                        mergedIds.add(blocker.id);
                        scoreInc += blocker.val;
                    } else {
                        if (r !== t.r || c !== t.c) moved = true;
                        t.r = r; t.c = c;
                        nextTiles.push(t);
                    }
                });

                if (moved) {
                    this.tiles = nextTiles;
                    this.updateScore(scoreInc);
                    this.addRandomTile();
                    this.render();
                    if (this.isGameOver()) document.getElementById('game-over').classList.remove('hidden');
                }
            }

            isGameOver() {
                if (this.tiles.length < this.size * this.size) return false;
                for (const t of this.tiles) {
                    for (const v of [{r:1,c:0},{r:-1,c:0},{r:0,c:1},{r:0,c:-1}]) {
                        const nt = this.tiles.find(o => o.r === t.r + v.r && o.c === t.c + v.c);
                        if (nt && nt.val === t.val) return false;
                    }
                }
                return true;
            }

            setupInput() {
                window.addEventListener('keydown', e => {
                    const k = e.key.toLowerCase();
                    if (k.startsWith('arrow') || ['w','a','s','d'].includes(k)) {
                        if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd'].includes(k)) {
                             e.preventDefault();
                        }
                    }
                    if (k === 'arrowup' || k === 'w') this.move(0);
                    if (k === 'arrowright' || k === 'd') this.move(1);
                    if (k === 'arrowdown' || k === 's') this.move(2);
                    if (k === 'arrowleft' || k === 'a') this.move(3);
                });

                let sx, sy;
                window.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; });
                window.addEventListener('touchend', e => {
                    const dx = e.changedTouches[0].clientX - sx;
                    const dy = e.changedTouches[0].clientY - sy;
                    if (Math.max(Math.abs(dx), Math.abs(dy)) > 30) {
                        if (Math.abs(dx) > Math.abs(dy)) this.move(dx > 0 ? 1 : 3);
                        else this.move(dy > 0 ? 2 : 0);
                    }
                });
            }
        }

        const game = new Game2048();
    </script>
</body>
</html>
